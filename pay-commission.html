<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pay Commission | PrimeLocal Lead</title>

<link rel="stylesheet" href="css/style.css">

<style>

.payment-container{
max-width:620px;
margin:80px auto;
padding:35px;
background:#ffffff;
border-radius:8px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.payment-container h1{
text-align:center;
margin-bottom:10px;
}

.payment-container p{
text-align:center;
color:#555;
margin-bottom:30px;
}

.payment-container input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
font-size:16px;
}

.result-box{
background:#f5f7ff;
padding:15px;
border-radius:6px;
margin-top:10px;
margin-bottom:20px;
font-weight:600;
text-align:center;
}

.paypal-container{
margin-top:25px;
text-align:center;
}

.note{
font-size:13px;
color:#777;
margin-top:15px;
text-align:center;
}

</style>

</head>

<body>

<div class="payment-container">

<h1>Pay Commission</h1>

<p>Complete your commission payment for the job received through PrimeLocal Lead.</p>

<input type="text" id="providerName" placeholder="Provider / Business Name">

<input type="number" id="jobAmount" placeholder="Total Job Value ($)">

<input type="number" id="commissionAmount" placeholder="Commission Amount Due ($)">

<div class="result-box">
Commission Payment: $<span id="paymentAmount">0</span>
</div>

<div id="paypal-button-container" class="paypal-container"></div>

<p class="note">
Commission payments support the PrimeLocal Lead platform and continued delivery of qualified leads.
</p>

</div>

<!-- PAYPAL SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=AYaPPE9GYKqcdk7Pop_K02EkaQ6TDI5r-eciMiTOhhOOCtAXA9yO5j9v76EasdfxThHDTKQIDurYb7XJ&currency=USD&intent=capture"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

const commissionInput = document.getElementById("commissionAmount");
const paymentDisplay = document.getElementById("paymentAmount");

let paymentValue = 0;

/* Update displayed commission */

commissionInput.addEventListener("input", function(){

paymentValue = parseFloat(commissionInput.value) || 0;

paymentDisplay.textContent = paymentValue.toFixed(2);

});

/* Initialize PayPal buttons */

function initPayPal(){

if(typeof paypal === "undefined"){

console.error("PayPal SDK did not load.");

return;

}

paypal.Buttons({

createOrder: function(data, actions){

if(paymentValue <= 0){

alert("Please enter the commission amount.");

return;

}

return actions.order.create({

purchase_units: [{
description: "PrimeLocal Lead Commission Payment",
amount: {
value: paymentValue.toFixed(2)
}
}]

});

},

onApprove: function(data, actions){

return actions.order.capture().then(function(details){

alert("Payment successful! Thank you for your commission payment.");

});

},

onError: function(err){

console.error("PayPal Checkout Error:", err);

alert("Payment failed. Please try again.");

}

}).render('#paypal-button-container');

}

/* Wait briefly for SDK */

setTimeout(initPayPal, 600);

});

</script>

</body>
</html>
